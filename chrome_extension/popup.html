<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PhishLens</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>🛡️ PhishLens</h2>

<button id="scan">🔍 Scan Website</button>

<div class="card result-card hidden" id="resultCard">
<div id="statusBadge" class="badge neutral"></div>
<p id="result">Click Scan to analyze</p>
<p id="confidence"></p>
</div>

<div id="loading" class="loading hidden">
  <div class="spinner"></div>
  <p id="loadingText">Analyzing...</p>
</div>

<div class="card">
<h3>⚙️ Agent Scores</h3>

<div class="agent">
<span>URL Agent</span>
<div class="bar"><div id="url_bar" class="fill"></div></div>
</div>

<div class="agent">
<span>NLP Agent</span>
<div class="bar"><div id="nlp_bar" class="fill"></div></div>
</div>

<div class="agent">
<span>Domain Agent</span>
<div class="bar"><div id="domain_bar" class="fill"></div></div>
</div>

</div>

<div class="card">
<h3>💡 Why this result?</h3>
<ul id="explanation"></ul>
</div>

</div>

<script src="popup.js"></script>
</body>
</html>
